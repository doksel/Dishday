# Automated production deploy on every push to `main`.
#
#   - Railway api + worker → triggered via the Railway CLI (`railway up`).
#                            Requires `RAILWAY_TOKEN` and `RAILWAY_SERVICE_*`
#                            secrets in GitHub repo settings.
#   - Vercel web + admin → triggered via Vercel's "Deploy Hooks"
#                          (one URL per project). Requires
#                          `VERCEL_WEB_DEPLOY_HOOK` and `VERCEL_ADMIN_DEPLOY_HOOK`.
#   - EAS mobile → intentionally NOT here. Store submissions need Apple/Google
#                  credentials and human review; keep this as a manual step
#                  via `eas build` / `eas submit` on a maintainer's machine.
#
# Set up secrets first — see docs/deployment.md.

name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy-railway-api:
    name: Railway · api
    runs-on: ubuntu-latest
    if: ${{ secrets.RAILWAY_TOKEN != '' }}
    steps:
      - uses: actions/checkout@v4
      - name: Install Railway CLI
        run: npm i -g @railway/cli
      - name: Deploy
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: railway up --service ${{ secrets.RAILWAY_SERVICE_API }} --detach

  deploy-railway-worker:
    name: Railway · worker
    runs-on: ubuntu-latest
    if: ${{ secrets.RAILWAY_TOKEN != '' }}
    steps:
      - uses: actions/checkout@v4
      - name: Install Railway CLI
        run: npm i -g @railway/cli
      - name: Deploy
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: railway up --service ${{ secrets.RAILWAY_SERVICE_WORKER }} --detach

  deploy-vercel-web:
    name: Vercel · web
    runs-on: ubuntu-latest
    if: ${{ secrets.VERCEL_WEB_DEPLOY_HOOK != '' }}
    steps:
      - name: Trigger Vercel deploy hook
        run: curl -X POST "${{ secrets.VERCEL_WEB_DEPLOY_HOOK }}"

  deploy-vercel-admin:
    name: Vercel · admin
    runs-on: ubuntu-latest
    if: ${{ secrets.VERCEL_ADMIN_DEPLOY_HOOK != '' }}
    steps:
      - name: Trigger Vercel deploy hook
        run: curl -X POST "${{ secrets.VERCEL_ADMIN_DEPLOY_HOOK }}"
